<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lefto - Donate Food</title>
  <link rel="stylesheet" href="donate.css">
</head>
<body>
<div id="donationsList"></div>
<div class="container">
  <h2>Donate Food</h2>

  <form id="donationForm">
    
    <label>Restaurant Name</label>
    <input type="text" id="restaurantName" required>

    <label>Food Type</label>
    <input type="text" id="foodType" required>

    <label>Quantity</label>
    <input type="number" id="quantity" required>

    <label>Upload Image</label>
    <input type="file" id="foodImage" accept="image/*" required>

    <label>Pickup Time</label>
    <input type="datetime-local" id="pickupTime" required>

    <button type="submit">Generate OTP & Submit</button>
  </form>

  <div id="otpBox" class="hidden">
    <h3>Your Pickup OTP</h3>
    <p id="otp"></p>
    <small>Share this OTP with the volunteer at pickup</small>
  </div>

</div>

<script src="donate.js"></script>
<div class="sticker sticker-apple">🍎</div>
<div class="sticker sticker-truck">🚚</div>
<div class="sticker sticker-bowl">🍲</div>
<div class="sticker sticker-bread">🍞</div>
</body>
</html>
